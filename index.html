<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gridlock Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --board-dark: #334155; /* slate-700 */
            --board-light: #475569; /* slate-600 */
            --lit-square: #06b6d4; /* cyan-500 */
            --lit-glow: rgba(6, 182, 212, 0.6);
            --target-square: #10b981; /* emerald-500 */
            --target-bg: rgba(16, 185, 129, 0.25);
            --highlight: rgba(255, 255, 255, 0.15); 
            --board-padding: 8px;
            --board-gap: 2px;
            --piece-color: #ffffff;
            --piece-shadow: 2px 4px 6px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.3s, color 0.3s;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            max-width: 100vw;
        }

        .board {
            display: grid;
            gap: var(--board-gap);
            padding: var(--board-padding);
            border-radius: 0.5rem;
            position: relative;
            max-width: 95vw;
            max-height: 70vh;
        }

        .square {
            width: clamp(30px, 10vw, 65px);
            height: clamp(30px, 10vw, 65px);
            border-radius: 0.25rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
            user-select: none;
        }

        .square.light { background-color: var(--board-light); }
        .square.dark { background-color: var(--board-dark); }

        .square.target {
            background-color: var(--target-bg);
            box-shadow: inset 0 0 0 3px var(--target-square), inset 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .square.lit {
            background-color: var(--lit-square);
            box-shadow: 0 0 20px var(--lit-glow);
            cursor: not-allowed;
        }

        .square.target.lit {
            background-color: var(--lit-square);
            box-shadow: inset 0 0 0 3px var(--target-square), 0 0 20px var(--lit-glow);
        }

        .square.valid-move {
            background-color: var(--highlight);
        }
        
        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }

        .square.target.valid-move::after {
            background-color: var(--target-square);
        }

        .piece {
            position: absolute;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--piece-color);
            text-shadow: var(--piece-shadow);
            margin: 0;
            padding: 0;
            font-weight: 300;
        }

        .piece.selected {
            transform: scale(1.15) translateY(-2px) !important;
            z-index: 20;
            opacity: 0.8;
        }

        .icon-btn {
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            opacity: 1;
        }
        .icon-btn:active {
            transform: scale(0.9);
        }
        .icon-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-50">

    <div id="game-container">
        <!-- Minimalist Header -->
        <header class="flex justify-between items-center w-full max-w-sm mb-8 px-2">
            <div class="flex items-center gap-4 sm:gap-6">
                <!-- Level -->
                <div class="flex items-center gap-2" title="Level">
                    <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <span id="level-display" class="text-2xl font-light">1</span>
                </div>
                <!-- Moves Current Level -->
                <div class="flex items-center gap-2" title="Level Moves">
                    <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    <span id="moves-display" class="text-2xl font-light">0</span>
                </div>
                <!-- Total Accumulative Moves (Sigma Icon) -->
                <div class="flex items-center gap-2" title="Total Accumulated Moves">
                    <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6H6l6 6-6 6h12"></path></svg>
                    <span id="total-moves-display" class="text-2xl font-light text-cyan-400">0</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="btn-undo" class="icon-btn" onclick="undoMove()" title="Undo">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                </button>
                <button id="btn-reset" class="icon-btn" onclick="resetLevel()" title="Restart">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </header>

        <div id="board" class="board bg-slate-800">
            <!-- Squares and pieces generated here -->
        </div>
    </div>

    <!-- Win Modal (Minimalist) -->
    <div id="win-modal" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full mx-4">
            <svg class="w-16 h-16 mx-auto mb-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div class="flex justify-center items-center gap-2 mb-8">
                <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                <span id="win-moves" class="font-semibold text-3xl text-white">0</span>
            </div>
            <button class="icon-btn mx-auto bg-slate-700 p-4 rounded-full text-white" onclick="nextLevel()">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const PIECE_TYPES = {
            'N': '♞', // Knight
            'B': '♝', // Bishop
            'R': '♜', // Rook
            'Q': '♛'  // Queen
        };

        let currentLevelIndex = 0;
        let currentLevelData = null; 
        let boardRows = 5;
        let boardCols = 5;
        
        let previousLevelsTotalMoves = 0;

        let gameState = {
            pieces: [],
            lights: [],
            moves: 0
        };
        let history = [];
        let selectedPieceId = null;
        let validMoves = []; // Array of {r, c}
        
        let boardElement = document.getElementById('board');
        let squareSize = 0; 
        const BOARD_PADDING = 8;
        const BOARD_GAP = 2;

        function initGame() {
            loadLevel(currentLevelIndex);
            window.addEventListener('resize', () => {
                calculateSquareSize();
                renderPieces();
            });
        }

        // --- SISTEMA DE GERAÇÃO REVERSA ---
        function generateLevel(index) {
            // Aumenta o tabuleiro mais rápido (a cada 2 níveis em vez de 3) para dar espaço
            const rows = Math.min(5 + Math.floor(index / 2), 8);
            const cols = rows;
            const numPieces = Math.min(2 + Math.floor(index / 2), 7);
            
            let levelData = null;
            let attempt = 0;
            
            // Tenta gerar tabuleiros
            while (!levelData && attempt < 300) {
                attempt++;
                levelData = tryGenerate(rows, cols, numPieces, index);
            }
            
            if (!levelData) {
                console.warn(`Falha após 300 tentativas no índice ${index}. Reduzindo dificuldade...`);
                return generateLevel(Math.max(0, index - 1)); // Tenta mais fácil se falhar
            }
            return levelData;
        }

        function getPiecePool(num) {
            const pool = ['N', 'R'];
            if (num > 2) pool.push('B');
            if (num > 3) pool.push('Q');
            if (num > 4) pool.push('N');
            if (num > 5) pool.push('R');
            if (num > 6) pool.push('B');
            return pool.slice(0, num);
        }

        function tryGenerate(rows, cols, numPieces, index) {
            // 1. Escolhe os destinos (Estado de Vitória)
            let targets = [];
            while(targets.length < numPieces) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!targets.some(t => t.r === r && t.c === c)) targets.push({r, c});
            }

            // 2. Coloca as peças nos destinos
            const pieceTypes = getPiecePool(numPieces);
            let pieces = targets.map((t, i) => ({
                id: 'p' + (i+1),
                type: pieceTypes[i],
                r: t.r,
                c: t.c
            }));

            boardRows = rows; // Atualiza globais para as funções auxiliares
            boardCols = cols;

            // 3. Luzes iniciais aleatórias (ESTADO DE VITÓRIA CORRIGIDO)
            // As casas de destino precisam estar acesas para podermos reverter a saída da peça.
            let lights = [];
            targets.forEach(t => {
                lights.push({r: t.r, c: t.c});
            });
            // Ruído aleatório no resto do tabuleiro
            for (let r=0; r<rows; r++) {
                for (let c=0; c<cols; c++) {
                    if (!targets.some(t => t.r === r && t.c === c) && Math.random() < 0.1) {
                        lights.push({r, c});
                    }
                }
            }

            // 4. Embaralhamento Reverso (Scramble)
            const scrambleSteps = 15 + index * 5;
            let actualSteps = 0;

            for (let i = 0; i < scrambleSteps; i++) {
                let allPossibleReverses = [];
                for (let piece of pieces) {
                    let moves = getReverseMoves(piece, lights, pieces);
                    moves.forEach(m => allPossibleReverses.push({piece, toR: m.r, toC: m.c}));
                }

                if (allPossibleReverses.length === 0) break; // Sem movimentos reversos possíveis

                // Escolhe um movimento reverso aleatório
                let move = allPossibleReverses[Math.floor(Math.random() * allPossibleReverses.length)];
                
                // Aplica a reversão (Luzes desfazem o toggle, peça volta pra casa anterior)
                lights = simulateToggle(move.piece.r, move.piece.c, lights);
                move.piece.r = move.toR;
                move.piece.c = move.toC;
                actualSteps++;
            }

            // Verifica se o embaralhamento foi bom o suficiente
            let piecesOnTargets = pieces.filter(p => targets.some(t => t.r === p.r && t.c === p.c)).length;
            
            if (actualSteps < scrambleSteps * 0.25 || piecesOnTargets >= Math.max(1, Math.ceil(numPieces / 2))) {
                return null; // Muito fácil ou travado muito cedo, gera novamente
            }

            return { rows, cols, targets, pieces, initialLights: lights };
        }

        function getReverseMoves(piece, currentLights, allPieces) {
            // A luz ANTES do movimento é o estado atual togglado na posição atual da peça
            const prevLights = simulateToggle(piece.r, piece.c, currentLights);
            
            // Regra: A peça não poderia ter pousado aqui se a casa já estivesse acesa antes do toggle!
            if (isLitInState(piece.r, piece.c, prevLights)) return [];

            let reverseMoves = [];
            
            if (piece.type === 'N') {
                const knightDirs = [[-2, -1], [-2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2], [2, -1], [2, 1]];
                knightDirs.forEach(dir => {
                    let nr = piece.r + dir[0];
                    let nc = piece.c + dir[1];
                    if (nr >= 0 && nr < boardRows && nc >= 0 && nc < boardCols && !getPieceAt(nr, nc, allPieces)) {
                        reverseMoves.push({r: nr, c: nc});
                    }
                });
            } else {
                let directions = [];
                if (piece.type === 'R' || piece.type === 'Q') directions.push([-1,0], [1,0], [0,-1], [0,1]);
                if (piece.type === 'B' || piece.type === 'Q') directions.push([-1,-1], [-1,1], [1,-1], [1,1]);
                
                directions.forEach(dir => {
                    let nr = piece.r + dir[0];
                    let nc = piece.c + dir[1];
                    while (nr >= 0 && nr < boardRows && nc >= 0 && nc < boardCols) {
                        if (isLitInState(nr, nc, prevLights)) break; // Raio bloqueado por luz
                        if (getPieceAt(nr, nc, allPieces)) break; // Raio bloqueado por peça
                        
                        reverseMoves.push({r: nr, c: nc});
                        nr += dir[0];
                        nc += dir[1];
                    }
                });
            }
            return reverseMoves;
        }

        function simulateToggle(r, c, currentLights) {
            let newLights = [...currentLights];
            const coordsToToggle = [
                {r: r, c: c}, {r: r - 1, c: c}, {r: r + 1, c: c}, {r: r, c: c - 1}, {r: r, c: c + 1}
            ];
            coordsToToggle.forEach(coord => {
                if (coord.r >= 0 && coord.r < boardRows && coord.c >= 0 && coord.c < boardCols) {
                    const idx = newLights.findIndex(l => l.r === coord.r && l.c === coord.c);
                    if (idx >= 0) newLights.splice(idx, 1);
                    else newLights.push({r: coord.r, c: coord.c});
                }
            });
            return newLights;
        }

        function isLitInState(r, c, stateLights) {
            return stateLights.some(l => l.r === r && l.c === c);
        }

        // --- LÓGICA DO JOGO ---

        function loadLevel(index) {
            document.getElementById('level-display').innerText = index + 1;
            
            currentLevelData = generateLevel(index);
            boardRows = currentLevelData.rows;
            boardCols = currentLevelData.cols;
            
            resetLevelState();
        }

        function resetLevel() {
            resetLevelState();
        }

        function resetLevelState() {
            gameState = {
                pieces: JSON.parse(JSON.stringify(currentLevelData.pieces)),
                lights: JSON.parse(JSON.stringify(currentLevelData.initialLights)),
                moves: 0
            };
            history = [];
            selectedPieceId = null;
            validMoves = [];
            
            updateUI();
            renderBoardAndPieces();
        }

        function saveState() {
            history.push(JSON.parse(JSON.stringify(gameState)));
        }

        function undoMove() {
            if (history.length > 0) {
                gameState = history.pop();
                selectedPieceId = null;
                validMoves = [];
                updateUI();
                renderBoardAndPieces();
            }
        }

        function updateUI() {
            document.getElementById('moves-display').innerText = gameState.moves;
            document.getElementById('total-moves-display').innerText = previousLevelsTotalMoves + gameState.moves;
            document.getElementById('btn-undo').disabled = history.length === 0;
        }

        function renderBoardAndPieces() {
            boardElement.innerHTML = '';
            
            boardElement.style.gridTemplateColumns = `repeat(${boardCols}, 1fr)`;
            boardElement.style.gridTemplateRows = `repeat(${boardRows}, 1fr)`;

            for (let r = 0; r < boardRows; r++) {
                for (let c = 0; c < boardCols; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    square.id = `sq-${r}-${c}`;
                    square.dataset.r = r;
                    square.dataset.c = c;
                    
                    if (isLit(r, c)) square.classList.add('lit');
                    if (isTarget(r, c)) square.classList.add('target');

                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }

            setTimeout(() => {
                calculateSquareSize();
                renderPieces();
            }, 10);
        }

        function calculateSquareSize() {
            const firstSquare = document.querySelector('.square');
            if (firstSquare) {
                squareSize = firstSquare.getBoundingClientRect().width;
            }
        }

        function renderPieces() {
            document.querySelectorAll('.piece').forEach(el => el.remove());
            if (squareSize === 0) return;

            const fontSize = squareSize * 0.65;

            gameState.pieces.forEach(p => {
                const pieceEl = document.createElement('div');
                pieceEl.className = `piece`;
                if (p.id === selectedPieceId) pieceEl.classList.add('selected');
                
                pieceEl.id = `piece-${p.id}`;
                pieceEl.innerText = PIECE_TYPES[p.type];
                pieceEl.style.fontSize = `${fontSize}px`;
                pieceEl.style.width = `${squareSize}px`;
                pieceEl.style.height = `${squareSize}px`;
                
                const leftPos = BOARD_PADDING + p.c * (squareSize + BOARD_GAP);
                const topPos = BOARD_PADDING + p.r * (squareSize + BOARD_GAP);
                
                pieceEl.style.left = `${leftPos}px`;
                pieceEl.style.top = `${topPos}px`;

                boardElement.appendChild(pieceEl);
            });
        }

        function handleSquareClick(r, c) {
            const clickedPiece = getPieceAt(r, c, gameState.pieces);

            if (selectedPieceId) {
                const isValid = validMoves.some(m => m.r === r && m.c === c);
                if (isValid) {
                    executeMove(selectedPieceId, r, c);
                    return;
                }
            }

            if (clickedPiece) {
                if (selectedPieceId === clickedPiece.id) {
                    selectedPieceId = null;
                    validMoves = [];
                } else {
                    selectedPieceId = clickedPiece.id;
                    calculateValidMoves(clickedPiece);
                }
                updateHighlights();
                renderPieces(); 
            } else {
                selectedPieceId = null;
                validMoves = [];
                updateHighlights();
                renderPieces();
            }
        }

        function executeMove(id, r, c) {
            saveState();
            
            const piece = gameState.pieces.find(p => p.id === id);
            piece.r = r;
            piece.c = c;
            gameState.moves++;
            
            gameState.lights = simulateToggle(r, c, gameState.lights);
            
            selectedPieceId = null;
            validMoves = [];
            
            updateUI();
            clearHighlights();
            renderBoardAndPieces();

            setTimeout(checkWinCondition, 350); 
        }

        function calculateValidMoves(piece) {
            validMoves = [];
            const { type, r, c } = piece;

            if (type === 'N') {
                const knightMoves = [[-2, -1], [-2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2], [2, -1], [2, 1]];
                knightMoves.forEach(dir => {
                    let nr = r + dir[0];
                    let nc = c + dir[1];
                    if (isWithinBounds(nr, nc) && !isLit(nr, nc) && !getPieceAt(nr, nc, gameState.pieces)) {
                        validMoves.push({r: nr, c: nc});
                    }
                });
            } else {
                let directions = [];
                if (type === 'R' || type === 'Q') directions.push([-1,0], [1,0], [0,-1], [0,1]);
                if (type === 'B' || type === 'Q') directions.push([-1,-1], [-1,1], [1,-1], [1,1]);
                
                directions.forEach(dir => {
                    let nr = r + dir[0];
                    let nc = c + dir[1];
                    while (isWithinBounds(nr, nc)) {
                        if (isLit(nr, nc)) break;
                        if (getPieceAt(nr, nc, gameState.pieces)) break;
                        
                        validMoves.push({r: nr, c: nc});
                        nr += dir[0];
                        nc += dir[1];
                    }
                });
            }
        }

        function isWithinBounds(r, c) {
            return r >= 0 && r < boardRows && c >= 0 && c < boardCols;
        }

        function isLit(r, c) {
            return gameState.lights.some(l => l.r === r && l.c === c);
        }

        function isTarget(r, c) {
            return currentLevelData.targets.some(t => t.r === r && t.c === c);
        }

        function getPieceAt(r, c, pieceArray) {
            return pieceArray.find(p => p.r === r && p.c === c);
        }

        function updateHighlights() {
            clearHighlights();
            validMoves.forEach(m => {
                const sq = document.getElementById(`sq-${m.r}-${m.c}`);
                if (sq) sq.classList.add('valid-move');
            });
        }

        function clearHighlights() {
            document.querySelectorAll('.square').forEach(sq => sq.classList.remove('valid-move'));
        }

        function checkWinCondition() {
            let allOnTarget = true;
            for (let piece of gameState.pieces) {
                if (!isTarget(piece.r, piece.c)) {
                    allOnTarget = false;
                    break;
                }
            }

            if (allOnTarget) {
                document.getElementById('win-moves').innerText = gameState.moves;
                document.getElementById('win-modal').classList.remove('hidden');
            }
        }

        function nextLevel() {
            document.getElementById('win-modal').classList.add('hidden');
            previousLevelsTotalMoves += gameState.moves; // Adiciona os movimentos do nível aos totais acumulados
            currentLevelIndex++;
            loadLevel(currentLevelIndex);
        }

        window.onload = initGame;

    </script>
</body>
</html>
